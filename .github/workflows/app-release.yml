name: app-release

# Builds, signs, notarizes, and publishes the KorpProxy macOS app + Sparkle
# appcast on `app-vX.Y.Z` tags. Engine binary releases are separate (release.yaml
# on `v*` tags). See RELEASING.md for the required secrets.

on:
  push:
    tags:
      - 'app-v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go (engine build)
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Developer ID signing certificate
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KP="$(openssl rand -base64 24)"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Decode notarization API key
        env:
          KEY_B64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: echo "$KEY_B64" | base64 --decode > "$RUNNER_TEMP/notary.p8"

      - name: Seed current appcast (preserve release history)
        run: |
          mkdir -p app
          curl -fsSL https://atkong.github.io/KorpProxy-releases/appcast.xml -o app/appcast.xml || true

      - name: Build · sign · notarize · package
        working-directory: ${{ github.workspace }}
        env:
          DEVELOPER_ID_APP: ${{ secrets.DEVELOPER_ID_APP }}
          NOTARY_KEY: ${{ runner.temp }}/notary.p8
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: ./app/scripts/package-app.sh

      - name: Publish release + appcast to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          V="${GITHUB_REF_NAME#app-v}"
          ZIP="app/dist/KorpProxy-${V}.zip"
          gh release create "app-v${V}" "$ZIP" \
            --repo ATKong/KorpProxy-releases \
            --title "KorpProxy ${V}" \
            --notes "Automated KorpProxy ${V} release. Installs/updates via Sparkle." \
            || gh release upload "app-v${V}" "$ZIP" --repo ATKong/KorpProxy-releases --clobber
          git clone "https://x-access-token:${GH_TOKEN}@github.com/ATKong/KorpProxy-releases.git" pubrepo
          cp app/dist/appcast.xml pubrepo/appcast.xml
          cd pubrepo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "release: KorpProxy ${V}" || echo "appcast unchanged"
          git push origin main

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/notary.p8"
