name: app-release

# Builds, signs, notarizes, and publishes the KorpProxy macOS app + Sparkle
# appcast on `app-vX.Y.Z` tags. Engine binary releases are separate (release.yaml
# on `v*` tags). See RELEASING.md for the required secrets.
#
# Canonical home is THIS repo: release assets + GitHub Release + the Sparkle
# appcast on the `gh-pages` branch (served at https://atkong.github.io/KorpProxy/).
# The same appcast is also written to the legacy public KorpProxy-releases feed
# as a BRIDGE, so already-installed 0.2.0-0.2.2 builds (which only poll the old
# URL baked into their binary) can discover the new release and migrate. Drop the
# bridge step once installs are on 0.2.3+.

on:
  push:
    tags:
      - 'app-v*'

permissions:
  contents: write # publish the Release + push the appcast to gh-pages on this repo

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go (engine build)
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Developer ID signing certificate
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KP="$(openssl rand -base64 24)"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Decode notarization API key
        env:
          KEY_B64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: echo "$KEY_B64" | base64 --decode > "$RUNNER_TEMP/notary.p8"

      - name: Seed current appcast (preserve release history)
        run: |
          mkdir -p app
          # Prefer this repo's canonical feed; fall back to the legacy feed during
          # the migration so existing release history is carried forward either way.
          curl -fsSL https://atkong.github.io/KorpProxy/appcast.xml -o app/appcast.xml \
            || curl -fsSL https://atkong.github.io/KorpProxy-releases/appcast.xml -o app/appcast.xml \
            || true

      - name: Build · sign · notarize · package
        working-directory: ${{ github.workspace }}
        env:
          DEVELOPER_ID_APP: ${{ secrets.DEVELOPER_ID_APP }}
          NOTARY_KEY: ${{ runner.temp }}/notary.p8
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          # Enclosure URL points at THIS repo's public release assets (canonical).
          # Both the new and the legacy bridge feed serve this same appcast, so the
          # download link must resolve regardless of which feed an install polls.
          DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: ./app/scripts/package-app.sh

      # Canonical publish: assets + GitHub Release on THIS repo, and the appcast
      # on this repo's gh-pages branch (served at https://atkong.github.io/KorpProxy/).
      - name: Publish release + appcast (canonical, this repo)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#app-v}"
          ZIP="app/dist/KorpProxy-${V}.zip"
          DMG="app/dist/KorpProxy-${V}.dmg"
          NOTES="Download **KorpProxy-${V}.dmg**, open it, and drag KorpProxy to Applications. Existing installs update automatically via Sparkle (or \"Check for Updates…\"). The .zip is the Sparkle update artifact."
          gh release create "app-v${V}" "$DMG" "$ZIP" \
            --repo "$GITHUB_REPOSITORY" \
            --title "KorpProxy ${V}" \
            --notes "$NOTES" \
            || gh release upload "app-v${V}" "$DMG" "$ZIP" --repo "$GITHUB_REPOSITORY" --clobber
          # Publish the appcast to gh-pages (orphan branch carrying only the feed).
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth 1 || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp app/dist/appcast.xml appcast.xml
          git add appcast.xml
          git commit -m "release: KorpProxy ${V}" || echo "appcast unchanged"
          git push origin gh-pages
          git checkout -

      # Bridge: also write the appcast to the legacy public feed so already-installed
      # 0.2.0-0.2.2 builds (which only poll the old URL) can see this release and
      # migrate. Assets in this feed point back at THIS repo's public release.
      # Safe to delete this step + the old repo once installs are on 0.2.3+.
      - name: Bridge appcast to legacy feed (migration)
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#app-v}"
          REPO="ATKong/KorpProxy-releases"
          # Update appcast.xml via the Contents API so the token (GH_TOKEN) is only
          # ever read from the environment by gh — never embedded in a clone URL.
          content="$(base64 < app/dist/appcast.xml | tr -d '\n')"
          sha="$(gh api "repos/${REPO}/contents/appcast.xml" -q .sha 2>/dev/null || true)"
          if [ -n "$sha" ]; then
            gh api -X PUT "repos/${REPO}/contents/appcast.xml" \
              -f message="bridge: KorpProxy ${V} (canonical on ATKong/KorpProxy)" \
              -f content="$content" -f sha="$sha" >/dev/null
          else
            gh api -X PUT "repos/${REPO}/contents/appcast.xml" \
              -f message="bridge: KorpProxy ${V} (canonical on ATKong/KorpProxy)" \
              -f content="$content" >/dev/null
          fi
          echo "Bridged appcast to ${REPO}."

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/notary.p8"
