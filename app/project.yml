name: KorpProxy
options:
  bundleIdPrefix: io.korp
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: "NO"
targets:
  KorpProxy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: KorpProxy-Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: KorpProxy
        CFBundleShortVersionString: "0.1.0"
    entitlements:
      path: KorpProxy.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.korp.KorpProxy
    postBuildScripts:
      - name: Embed KorpProxy engine
        basedOnDependencyAnalysis: false
        script: |
          "${SRCROOT}/scripts/build-engine.sh" --bundle "${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}"
