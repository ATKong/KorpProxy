name: KorpProxy
options:
  bundleIdPrefix: io.korp
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.2.1"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # Hardened runtime is required for Developer ID notarization (release builds).
    ENABLE_HARDENED_RUNTIME: "YES"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.2"
targets:
  KorpProxy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: Sparkle
    info:
      path: KorpProxy-Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: KorpProxy
        # Driven by the build settings so a release tag can bump them in one place.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Sparkle auto-update. Feed is served from the public releases repo via
        # GitHub Pages; SUPublicEDKey verifies update signatures (private key is
        # the SPARKLE_PRIVATE_KEY CI secret).
        SUFeedURL: "https://atkong.github.io/KorpProxy-releases/appcast.xml"
        SUPublicEDKey: "Vy+hU7sQEtUWg3I6uIGv6LPhWZ2VpWgrfCXZS7W+z+E="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    entitlements:
      path: KorpProxy.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.network.server: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.korp.KorpProxy
    postBuildScripts:
      - name: Embed KorpProxy engine
        basedOnDependencyAnalysis: false
        script: |
          "${SRCROOT}/scripts/build-engine.sh" --bundle "${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}"
